<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Rocky Hijab Member - Offline</title>
    <style>
        /* CSS Murni untuk pengganti Tailwind agar bisa OFFLINE */
        :root {
            --dark-custom: #0f172a;
            --amber-500: #f59e0b;
            --amber-400: #fbbf24;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-900: #0f172a;
            --red-50: #fef2f2;
            --red-100: #fee2e2;
            --red-600: #dc2626;
            --emerald-50: #ecfdf5;
            --emerald-100: #d1fae5;
            --emerald-600: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
            padding: 1rem;
        }

        @media (min-width: 768px) {
            body { padding: 2rem; }
        }

        .max-w-md {
            max-width: 28rem;
            margin-left: auto;
            margin-right: auto;
        }

        .container-app {
            background-color: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            border: 1px solid var(--slate-200);
        }

        /* Header */
        .header {
            background-color: var(--dark-custom);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 4px solid var(--amber-500);
        }

        .header h1 {
            color: var(--amber-400);
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .header p {
            color: var(--slate-400);
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 0.25rem;
            font-weight: 700;
            font-style: italic;
            letter-spacing: 0.1em;
        }

        .content {
            padding: 1.5rem;
        }

        .space-y-6 > * + * { margin-top: 1.5rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .space-y-2 > * + * { margin-top: 0.5rem; }

        .label-input {
            display: block;
            font-size: 10px;
            font-weight: 900;
            color: var(--slate-400);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 1.5rem;
            border-radius: 1rem;
            background-color: var(--slate-50);
            border: 2px solid var(--slate-100);
            outline: none;
            font-size: 2.25rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            color: var(--slate-900);
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--amber-500);
            background-color: white;
        }

        /* Results */
        .hidden { display: none !important; }

        .toggle-btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: -0.5rem;
        }

        .toggle-btn {
            background-color: var(--slate-100);
            border: 1px solid var(--slate-200);
            padding: 0.5rem;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: background 0.2s;
        }

        .toggle-btn:hover { background-color: var(--slate-200); }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .card-modal {
            background-color: var(--red-50);
            border: 1px solid var(--red-100);
            border-radius: 1rem;
            padding: 1.25rem;
            text-align: center;
        }

        .card-untung {
            background-color: var(--emerald-50);
            border: 1px solid var(--emerald-100);
            border-radius: 1rem;
            padding: 1.25rem;
            text-align: center;
        }

        .text-modal { color: var(--red-600); font-weight: 900; font-size: 1.25rem; font-style: italic; }
        .text-untung { color: var(--emerald-600); font-weight: 900; font-size: 1.25rem; font-style: italic; }

        .card-total {
            background-color: var(--dark-custom);
            color: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border-bottom: 8px solid var(--amber-500);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .label-total {
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--amber-400);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
        }

        .price-total {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.025em;
        }

        .placeholder-box {
            padding: 3rem 0;
            text-align: center;
            color: var(--slate-300);
            border: 2px dashed var(--slate-100);
            border-radius: 1.5rem;
        }

        /* Legend Style */
        .legend-box {
            background-color: var(--slate-50);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid var(--slate-100);
        }

        .legend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .legend-title {
            font-size: 10px;
            font-weight: 900;
            color: var(--slate-500);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--slate-200);
            padding-bottom: 0.25rem;
            font-size: 10px;
            font-weight: 700;
            color: var(--slate-600);
        }

        .legend-val { color: #4f46e5; }
        
        .italic { font-style: italic; }

        .icon-small {
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .icon-small:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="max-w-md container-app">
        <!-- Header -->
        <div class="header">
            <h1>ROCKY HIJAB MEMBER</h1>
            <p>PROGRAM BY ALFAJRI</p>
        </div>

        <div class="content space-y-6">
            <!-- Input Area -->
            <div class="space-y-4">
                <label class="label-input">INPUT KODE GABUNGAN</label>
                <input 
                    type="text" 
                    id="kodeInput"
                    placeholder="CONTOH: (A)AU" 
                    oninput="hitungHarga()"
                    autocomplete="off"
                >
            </div>

            <!-- Result Display -->
            <div id="resultContainer" class="hidden space-y-4">
                <div class="toggle-btn-container">
                    <button onclick="toggleVisibility()" class="toggle-btn" title="Lihat/Sembunyikan Modal">
                        <span id="eyeIcon">
                            <!-- Icon Mata Tertutup Default -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </span>
                    </button>
                </div>

                <div class="grid-2">
                    <div class="card-modal">
                        <p id="modalTxt" class="text-modal">••••••</p>
                    </div>
                    <div class="card-untung">
                        <p id="untungTxt" class="text-untung">••••••</p>
                    </div>
                </div>

                <div class="card-total">
                    <p class="label-total">Harga Jual Member</p>
                    <p id="totalTxt" class="price-total">Rp 0</p>
                </div>
            </div>

            <!-- Placeholder -->
            <div id="placeholder" class="placeholder-box">
                <p style="font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em;">Siap Menghitung...</p>
            </div>

            <!-- Legend Table (V9) -->
            <div class="legend-box">
                <div class="legend-header" onclick="toggleLegend()">
                    <p class="legend-title">🔑 LOGIKA KODE (V9)</p>
                    <span id="legendEyeIcon" class="icon-small">
                        <!-- Icon Mata Tertutup -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </span>
                </div>
                
                <div id="legendContent" class="space-y-2 hidden" style="margin-top: 0.75rem;">
                   <div class="legend-item">
                     <span>(A)AU</span>
                     <span class="legend-val">100 + 10 + 5 = 115</span>
                   </div>
                   <div class="legend-item">
                     <span>(I)P</span>
                     <span class="legend-val">200 + 1 = 201</span>
                   </div>
                   <div class="legend-item" style="border:none">
                     <span>A- / I-</span>
                     <span class="legend-val">Puluhan Bulat (10 / 20)</span>
                   </div>
                   <div class="legend-item" style="border-top:1px solid #e2e8f0; padding-top: 0.5rem; border-bottom:none">
                     <span>KUNCI:</span>
                     <span class="legend-val">PINTU SORGA (A=0)</span>
                   </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseMap = {
            'P': 1, 'I': 2, 'N': 3, 'T': 4, 'U': 5, 
            'S': 6, 'O': 7, 'R': 8, 'G': 9, 'A': 0
        };

        let isVisible = false;
        let isLegendVisible = false;
        let lastModalValue = 0;
        let lastUntungValue = 0;

        function toggleLegend() {
            isLegendVisible = !isLegendVisible;
            const content = document.getElementById('legendContent');
            const icon = document.getElementById('legendEyeIcon');
            
            if (isLegendVisible) {
                content.classList.remove('hidden');
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
            } else {
                content.classList.add('hidden');
                icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            }
        }

        function toggleVisibility() {
            isVisible = !isVisible;
            const modalTxt = document.getElementById('modalTxt');
            const untungTxt = document.getElementById('untungTxt');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (isVisible) {
                modalTxt.innerText = "Rp " + (lastModalValue * 1000).toLocaleString('id-ID');
                untungTxt.innerText = "+Rp " + (lastUntungValue * 1000).toLocaleString('id-ID');
                modalTxt.classList.remove('italic');
                untungTxt.classList.remove('italic');
                eyeIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
            } else {
                modalTxt.innerText = "••••••";
                untungTxt.innerText = "••••••";
                modalTxt.classList.add('italic');
                untungTxt.classList.add('italic');
                eyeIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            }
        }

        function hitungHarga() {
            const input = document.getElementById('kodeInput').value.toUpperCase().replace(/\s/g, '');
            const resultContainer = document.getElementById('resultContainer');
            const placeholder = document.getElementById('placeholder');
            
            if (!input) {
                resultContainer.classList.add('hidden');
                placeholder.classList.remove('hidden');
                return;
            }

            let totalModal = 0;
            let tempInput = input;

            const ratusanRegex = /\((P|I|N|T|U|S|O|R|G|A)\)/g;
            let match;
            while ((match = ratusanRegex.exec(input)) !== null) {
                const char = match[1];
                totalModal += (char === 'A' ? 100 : baseMap[char] * 100);
                tempInput = tempInput.replace(match[0], '');
            }

            if (tempInput.length > 0) {
                if (tempInput.includes('-')) {
                    const char = tempInput.split('-')[0];
                    totalModal += (char === 'A' ? 10 : baseMap[char] * 10);
                } else if (tempInput.length === 2) {
                    const p1 = tempInput[0];
                    const p2 = tempInput[1];
                    totalModal += (p1 === 'A' ? 10 : baseMap[p1] * 10);
                    totalModal += baseMap[p2];
                } else if (tempInput.length === 1) {
                    const char = tempInput[0];
                    totalModal += (char === 'A' ? 10 : baseMap[char]);
                } else {
                    for (let char of tempInput) {
                        if (baseMap[char] !== undefined) totalModal += baseMap[char];
                    }
                }
            }

            if (totalModal <= 0) {
                resultContainer.classList.add('hidden');
                placeholder.classList.remove('hidden');
                return;
            }

            lastModalValue = totalModal;

            let untung = 0;
            if (totalModal >= 1 && totalModal <= 20) untung = 5;
            else if (totalModal > 20 && totalModal <= 45) untung = 8;
            else if (totalModal > 45 && totalModal <= 70) untung = 10;
            else if (totalModal > 70 && totalModal <= 99) untung = 15;
            else if (totalModal >= 100 && totalModal <= 200) untung = 20;
            else untung = 25;

            lastUntungValue = untung;
            const hargaMember = totalModal + untung;

            if (isVisible) {
                document.getElementById('modalTxt').innerText = "Rp " + (totalModal * 1000).toLocaleString('id-ID');
                document.getElementById('untungTxt').innerText = "+Rp " + (untung * 1000).toLocaleString('id-ID');
            } else {
                document.getElementById('modalTxt').innerText = "••••••";
                document.getElementById('untungTxt').innerText = "••••••";
            }
            
            document.getElementById('totalTxt').innerText = "Rp " + (hargaMember * 1000).toLocaleString('id-ID');
            
            resultContainer.classList.remove('hidden');
            placeholder.classList.add('hidden');
        }
    </script>
</body>
</html>
