<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Rocky Hijab Member</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-dark-custom { background-color: #0f172a; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
        
        <!-- Header -->
        <div class="bg-dark-custom p-6 text-white text-center relative border-b-4 border-amber-500">
            <h1 class="text-xl font-black tracking-widest text-amber-400 flex justify-center items-center gap-2">
                ROCKY HIJAB MEMBER
            </h1>
            <p class="text-slate-400 text-[10px] uppercase mt-1 font-bold italic tracking-widest">
                PROGRAM BY ALFAJRI
            </p>
        </div>

        <div class="p-6 space-y-6">
            <!-- Input Area -->
            <div class="space-y-4">
                <label class="block text-[10px] font-black text-slate-400 uppercase text-center tracking-widest">INPUT KODE GABUNGAN</label>
                <input 
                    type="text" 
                    id="kodeInput"
                    placeholder="CONTOH: (A)AU" 
                    class="w-full px-5 py-6 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-amber-500 transition-all outline-none text-4xl font-black uppercase text-slate-900 text-center tracking-widest"
                    oninput="hitungHarga()"
                >
            </div>

            <!-- Result Display -->
            <div id="resultContainer" class="hidden space-y-4 transition-all duration-300">
                <!-- Eye Toggle Button (Satu untuk semua) -->
                <div class="flex justify-center -mb-2">
                    <button onclick="toggleVisibility()" class="bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors border border-slate-200 shadow-sm">
                        <span id="eyeIcon">
                            <!-- Icon Mata Tertutup (Default) -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88L4.62 4.62"/><path d="M1 1l22 22"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><circle cx="12" cy="12" r="3"/><path d="M14.12 14.12l-4.24-4.24"/></svg>
                        </span>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <!-- Modal (Warna Merah - Tanpa Nama) -->
                    <div class="bg-red-50 border border-red-100 rounded-2xl p-5 text-center shadow-inner">
                        <p id="modalTxt" class="text-xl font-black text-red-600 tracking-tighter italic">••••••</p>
                    </div>
                    
                    <!-- Untung (Warna Hijau - Tanpa Nama) -->
                    <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 text-center shadow-inner">
                        <p id="untungTxt" class="text-xl font-black text-emerald-600 italic">••••••</p>
                    </div>
                </div>

                <div class="bg-dark-custom text-white p-6 rounded-3xl shadow-xl border-b-8 border-amber-500">
                    <p class="text-center text-[10px] font-bold text-amber-400 uppercase tracking-[0.3em] mb-2">Harga Jual Member</p>
                    <p id="totalTxt" class="text-center text-5xl font-black tracking-tight text-white">Rp 0</p>
                </div>
            </div>

            <!-- Placeholder -->
            <div id="placeholder" class="py-12 text-center text-slate-300 border-2 border-dashed border-slate-100 rounded-3xl">
                <p class="text-xs font-bold uppercase tracking-widest">Siap Menghitung...</p>
            </div>

            <!-- Legend Table -->
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-3 flex items-center gap-2">
                   🔑 LOGIKA KODE (V9)
                </p>
                <div class="space-y-2 text-[10px] font-bold text-slate-600">
                   <div class="flex justify-between border-b pb-1 border-slate-200">
                     <span>(A)AU</span>
                     <span class="text-indigo-600">100 + 10 + 5 = 115</span>
                   </div>
                   <div class="flex justify-between border-b pb-1 border-slate-200">
                     <span>(I)P</span>
                     <span class="text-indigo-600">200 + 1 = 201</span>
                   </div>
                   <div class="flex justify-between">
                     <span>A- / I-</span>
                     <span class="text-indigo-600">Puluhan Bulat (10 / 20)</span>
                   </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseMap = {
            'P': 1, 'I': 2, 'N': 3, 'T': 4, 'U': 5, 
            'S': 6, 'O': 7, 'R': 8, 'G': 9, 'A': 0
        };

        let isVisible = false;
        let lastModalValue = 0;
        let lastUntungValue = 0;

        function toggleVisibility() {
            isVisible = !isVisible;
            const modalTxt = document.getElementById('modalTxt');
            const untungTxt = document.getElementById('untungTxt');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (isVisible) {
                modalTxt.innerText = "Rp " + (lastModalValue * 1000).toLocaleString();
                untungTxt.innerText = "+Rp " + (lastUntungValue * 1000).toLocaleString();
                modalTxt.classList.remove('italic');
                untungTxt.classList.remove('italic');
                eyeIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
            } else {
                modalTxt.innerText = "••••••";
                untungTxt.innerText = "••••••";
                modalTxt.classList.add('italic');
                untungTxt.classList.add('italic');
                eyeIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88L4.62 4.62"/><path d="M1 1l22 22"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><circle cx="12" cy="12" r="3"/><path d="M14.12 14.12l-4.24-4.24"/></svg>';
            }
        }

        function hitungHarga() {
            const input = document.getElementById('kodeInput').value.toUpperCase().replace(/\s/g, '');
            const resultContainer = document.getElementById('resultContainer');
            const placeholder = document.getElementById('placeholder');
            
            if (!input) {
                resultContainer.classList.add('hidden');
                placeholder.classList.remove('hidden');
                return;
            }

            let totalModal = 0;
            let tempInput = input;

            const ratusanRegex = /\((P|I|N|T|U|S|O|R|G|A)\)/g;
            let match;
            while ((match = ratusanRegex.exec(input)) !== null) {
                const char = match[1];
                totalModal += (char === 'A' ? 100 : baseMap[char] * 100);
                tempInput = tempInput.replace(match[0], '');
            }

            if (tempInput.length > 0) {
                if (tempInput.includes('-')) {
                    const char = tempInput.split('-')[0];
                    totalModal += (char === 'A' ? 10 : baseMap[char] * 10);
                } else if (tempInput.length === 2) {
                    const p1 = tempInput[0];
                    const p2 = tempInput[1];
                    totalModal += (p1 === 'A' ? 10 : baseMap[p1] * 10);
                    totalModal += baseMap[p2];
                } else if (tempInput.length === 1) {
                    const char = tempInput[0];
                    totalModal += (char === 'A' ? 10 : baseMap[char]);
                } else {
                    for (let char of tempInput) {
                        if (baseMap[char] !== undefined) totalModal += baseMap[char];
                    }
                }
            }

            if (totalModal <= 0) {
                resultContainer.classList.add('hidden');
                placeholder.classList.remove('hidden');
                return;
            }

            lastModalValue = totalModal;

            let untung = 0;
            if (totalModal >= 1 && totalModal <= 20) untung = 5;
            else if (totalModal > 20 && totalModal <= 45) untung = 8;
            else if (totalModal > 45 && totalModal <= 70) untung = 10;
            else if (totalModal > 70 && totalModal <= 99) untung = 15;
            else if (totalModal >= 100 && totalModal <= 200) untung = 20;
            else untung = 25;

            lastUntungValue = untung;
            const hargaMember = totalModal + untung;

            if (isVisible) {
                document.getElementById('modalTxt').innerText = "Rp " + (totalModal * 1000).toLocaleString();
                document.getElementById('untungTxt').innerText = "+Rp " + (untung * 1000).toLocaleString();
            } else {
                document.getElementById('modalTxt').innerText = "••••••";
                document.getElementById('untungTxt').innerText = "••••••";
            }
            
            document.getElementById('totalTxt').innerText = "Rp " + (hargaMember * 1000).toLocaleString();
            
            resultContainer.classList.remove('hidden');
            placeholder.classList.add('hidden');
        }
    </script>
</body>
</html>
